site_name: Tiếng Hàn Tổng Hợp - Sơ Cấp 1
site_description: Website tự học Tiếng Hàn Tổng Hợp dành cho người Việt - Quyển 1
site_url: https://toanga.github.io/tienghan-quyen1/

docs_dir: docs
site_dir: site
exclude_docs: |
  .github/
  site/
  .git/

theme:
  name: material
  language: vi
  icon:
    logo: material/school
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Chuyển sang giao diện tối
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Chuyển sang giao diện sáng

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: Tiếng Hàn Tổng Hợp Sơ Cấp 1

extra:
  generator: false

nav:
  - Trang chủ: index.md
  - Bài học:
      - Bài 01 - 소개: lessons/bai-01.md
      - Bài 02 - 학교: lessons/bai-02.md
      - Bài 03 - 일상생활: lessons/bai-03.md
      - Bài 04 - 날짜와 요일: lessons/bai-04.md
      - Bài 05 - 하루 일과: lessons/bai-05.md
      - Bài 06 - 주말: lessons/bai-06.md
      - Bài 07 - 물건 사기 (1): lessons/bai-07.md
      - Bài 08 - 음식: lessons/bai-08.md
      - Bài 09 - 집: lessons/bai-09.md
      - Bài 10 - 가족: lessons/bai-10.md
  - Ngữ pháp:
      - 입니다: grammar/imnida.md
      - 입니까?: grammar/imnikka.md
      - 은/는: grammar/eun-neun.md
      - 이/가: grammar/i-ga.md
      - "-(으)시-": grammar/honorific-si.md
      - "-ㅂ/습니다": grammar/seumnida.md
      - Số Hán Hàn: grammar/sino-korean-numbers.md
      - "-아/어요": grammar/a-eoyo.md
      - "-았/었어요": grammar/past-tense-aeosseoyo.md
      - 하고: grammar/hago.md
      - "-(으)ㅂ시다": grammar/eupsida.md
      - "-고 싶어요": grammar/go-sipeoyo.md
      - "-지 않다": grammar/ji-anta.md
      - "-(으)세요": grammar/euseyo.md
      - "에 있다/없다": grammar/e-itda-eopda.md
      - "에서": grammar/eseo.md
